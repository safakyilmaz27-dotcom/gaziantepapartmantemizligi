<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #064e3b 0%, #10b981 65%, #34d399 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .bg-circle1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    top: -150px; right: -100px;
  }
  .bg-circle2 {
    position: absolute;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    bottom: -100px; left: -80px;
  }
  .card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 80px;
    width: 100%;
  }
  .icon-box {
    width: 160px;
    height: 160px;
    background: rgba(255,255,255,0.15);
    border-radius: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 90px;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.25);
  }
  .content { flex: 1; color: white; }
  .badge {
    display: inline-block;
    background: rgba(255,255,255,0.18);
    border: 1px solid rgba(255,255,255,0.3);
    padding: 8px 20px;
    border-radius: 100px;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 20px;
    letter-spacing: 0.03em;
  }
  h1 {
    font-size: 56px;
    font-weight: 800;
    line-height: 1.1;
    margin-bottom: 18px;
    letter-spacing: -0.02em;
  }
  h1 span { color: #fde68a; }
  p {
    font-size: 24px;
    opacity: 0.9;
    margin-bottom: 30px;
    line-height: 1.4;
  }
  .phone {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: white;
    color: #059669;
    padding: 14px 28px;
    border-radius: 100px;
    font-size: 26px;
    font-weight: 800;
  }
</style>
</head>
<body>
  <div class="bg-circle1"></div>
  <div class="bg-circle2"></div>
  <div class="card">
    <div class="icon-box">🏢</div>
    <div class="content">
      <div class="badge">⭐ Gaziantep'in Güvenilen Temizlik Firması</div>
      <h1>Gaziantep <span>Apartman</span><br/>Temizliği</h1>
      <p>Merdiven temizliği · Çöp alımı · Dezenfeksiyon<br/>Şahinbey · Şehitkamil · Karataş · Gazikent</p>
      <div class="phone">📞 0545 133 28 59</div>
    </div>
  </div>
</body>
</html>
