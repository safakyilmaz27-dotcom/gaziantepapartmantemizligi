<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sayfa Bulunamadı (404) | Gaziantep Ege Temizlik</title>
<meta name="robots" content="noindex, follow" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />

<link rel="stylesheet" href="/styles.css" />
<style>
  .err { min-height: 70vh; display: grid; place-items: center; text-align: center; padding: 60px 22px; }
  .err .code { font-family: var(--font-head); font-weight: 800; font-size: clamp(64px, 14vw, 130px); color: var(--blue); line-height: 1; }
  .err h1 { font-size: clamp(24px, 4vw, 34px); margin: 8px 0 12px; }
  .err p { color: var(--muted); max-width: 460px; margin: 0 auto 26px; }
  .err .btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
</style>
</head>
<body>
<section class="err">
  <div>
    <div class="code">404</div>
    <h1>Aradığınız sayfa bulunamadı</h1>
    <p>Sayfa taşınmış veya kaldırılmış olabilir. Ana sayfaya dönebilir ya da bizi arayabilirsiniz.</p>
    <div class="btns">
      <a href="/" class="btn btn-primary btn-lg">Ana Sayfaya Dön</a>
      <a href="tel:+905320630389" class="btn btn-accent btn-lg">📞 0532 063 03 89</a>
    </div>
  </div>
</section>
